<svg width="64" height="64" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="qRingGrad" x1="10" y1="10" x2="90" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stopColor="#38bdf8" />
      <stop offset="50%" stopColor="#6366f1" />
      <stop offset="100%" stopColor="#10b981" />
    </linearGradient>
    <linearGradient id="qWaveGrad" x1="20" y1="70" x2="80" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stopColor="#38bdf8" stopOpacity="0.8" />
      <stop offset="50%" stopColor="#a855f7" stopOpacity="1" />
      <stop offset="100%" stopColor="#34d399" stopOpacity="0.9" />
    </linearGradient>
    <filter id="nodeGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Dark Rounded Container -->
  <rect width="100" height="100" rx="24" fill="#0f172a" />
  <rect x="2" y="2" width="96" height="96" rx="22" stroke="url(#qRingGrad)" strokeWidth="2" strokeOpacity="0.6" />

  <!-- Outer Ring of Q -->
  <circle cx="48" cy="46" r="33" stroke="url(#qRingGrad)" strokeWidth="5.5" />

  <!-- Precision Tail of Q -->
  <path d="M 66 64 L 86 86" stroke="url(#qRingGrad)" strokeWidth="7" strokeLinecap="round" />

  <!-- Gaussian Bell Curve -->
  <path d="M 22 58 Q 33 58 41 42 Q 48 18 55 42 Q 63 58 74 58" stroke="url(#qWaveGrad)" strokeWidth="3.5" strokeLinecap="round" fill="none" />
  <path d="M 22 58 Q 33 58 41 42 Q 48 18 55 42 Q 63 58 74 58 L 74 64 L 22 64 Z" fill="url(#qRingGrad)" opacity="0.22" />

  <!-- Interactive Nodes -->
  <circle cx="48" cy="18" r="4.5" fill="#38bdf8" filter="url(#nodeGlow)" />
  <circle cx="48" cy="18" r="1.5" fill="#ffffff" />
  <circle cx="37" cy="45" r="3" fill="#a855f7" />
  <circle cx="59" cy="45" r="3" fill="#34d399" />
</svg>